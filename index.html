    ctx.fill();
    ctx.fillStyle = '#000';
    const eyeShift = inAir ? 0.6 : 0;
    ctx.beginPath();
    ctx.arc(cx - 3.5 + eyeShift, cy - 7, 1.4, 0, Math.PI*2);
    ctx.arc(cx + 4.5 + eyeShift, cy - 7, 1.4, 0, Math.PI*2);
    ctx.fill();
    // Nostrils
    ctx.fillStyle = '#3a1808';
    ctx.fillRect(cx - 2, cy - 3, 1.5, 2);
    ctx.fillRect(cx + 0.5, cy - 3, 1.5, 2);
    // Mouth (smile when grounded, "o" when in air)
    ctx.strokeStyle = '#3a1808';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    if (inAir){
        ctx.arc(cx, cy + 1, 1.8, 0, Math.PI*2);
    } else {
        ctx.arc(cx, cy + 1, 3, 0.1 * Math.PI, 0.9 * Math.PI);
    }
    ctx.stroke();
}

function drawCart(cx, cy, fr){
    // Body bucket-shape
    // Bottom dark
    ctx.fillStyle = C.cartDark;
    ctx.beginPath();
    ctx.moveTo(cx - 30, cy + 6);
    ctx.lineTo(cx + 30, cy + 6);
    ctx.lineTo(cx + 26, cy + 18);
    ctx.lineTo(cx - 26, cy + 18);
    ctx.closePath();
    ctx.fill();
    // Main wood
    ctx.fillStyle = C.cartWood;
    ctx.beginPath();
    ctx.moveTo(cx - 32, cy - 10);
    ctx.lineTo(cx + 32, cy - 10);
    ctx.lineTo(cx + 30, cy + 6);
    ctx.lineTo(cx - 30, cy + 6);
    ctx.closePath();
    ctx.fill();
    // Plank lines
    ctx.strokeStyle = C.cartDark;
    ctx.lineWidth = 1;
    for (let i = -3; i <= 3; i++){
        const px = cx + i * 9;
        ctx.beginPath();
        ctx.moveTo(px, cy - 10);
        ctx.lineTo(px - 0.4, cy + 6);
        ctx.stroke();
    }
    // Iron bands
    ctx.fillStyle = C.cartIron;
    ctx.fillRect(cx - 32, cy - 10, 64, 3);
    ctx.fillRect(cx - 30, cy + 5, 60, 3);
    // Rivets
    for (let i = -2; i <= 2; i++){
        ctx.fillStyle = '#0a0a0a';
        ctx.beginPath();
        ctx.arc(cx + i * 12, cy - 8.5, 1.5, 0, Math.PI*2);
        ctx.arc(cx + i * 12, cy + 6.5, 1.4, 0, Math.PI*2);
        ctx.fill();
    }
    // Front lip highlight
    ctx.fillStyle = '#8a4a20';
    ctx.fillRect(cx - 32, cy - 10, 64, 1);
    // Wheels (slightly tucked, sit on the rails)
    const wr = (fr * 0.5);
    drawWheel(cx - 18, cy + 10, 9, wr);
    drawWheel(cx + 18, cy + 10, 9, wr);
}

function drawWheel(cx, cy, r, rot){
    // Outer black
    ctx.fillStyle = C.cartIron;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fill();
    // Inner ring
    ctx.fillStyle = '#3a3a3a';
    ctx.beginPath();
    ctx.arc(cx, cy, r - 2.5, 0, Math.PI*2);
    ctx.fill();
    // Spokes
    ctx.strokeStyle = C.cartIron;
    ctx.lineWidth = 2.4;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rot);
    for (let i = 0; i < 4; i++){
        ctx.rotate(Math.PI / 2);
        ctx.beginPath();
        ctx.moveTo(-r + 2, 0);
        ctx.lineTo(r - 2, 0);
        ctx.stroke();
    }
    ctx.restore();
    // Hub
    ctx.fillStyle = C.cartIron;
    ctx.beginPath();
    ctx.arc(cx, cy, 3, 0, Math.PI*2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(cx - r*0.4, cy - r*0.4, 1.5, 0, Math.PI*2);
    ctx.fill();
}

// --- PARTICLES ---
function drawParticles(){
    for (const p of particles){
        if (p.life <= 0) continue;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.max(0, Math.min(1, p.life * 2));
        ctx.beginPath();
        ctx.arc(p.x - worldX * 0, p.y, p.size, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

// --- HUD ---
function drawHUD(){
    const k = HUD_SCALE;
    const padX = 16 * k;
    const padY = 18 * k;
    const rowH = 30 * k;
    const labelCol = 60 * k;     // x where values start (after the label)

    // Subtle dark fade-out backdrop on the left so values pop on any BG
    const bgW = 200 * k;
    const bgH = (rowH * 3 + 18 * k);
    const grad = ctx.createLinearGradient(0, 0, bgW, 0);
    grad.addColorStop(0, 'rgba(0,0,0,0.55)');
    grad.addColorStop(0.7, 'rgba(0,0,0,0.20)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, bgW, bgH);

    ctx.textBaseline = 'top';
    ctx.textAlign = 'left';

    // ROW 1 — Bananas (icon + count, brightest, with pulse on grab)
    const iconScale = (1 + hudPulse * 0.45) * k;
    ctx.save();
    ctx.translate(padX + 8 * k, padY + 12 * k);
    ctx.scale(iconScale, iconScale);
    drawBanana(0, 0, 1, -0.4);
    ctx.restore();

    const txtScale = (1 + hudPulse * 0.25);
    ctx.save();
    ctx.translate(padX + 32 * k, padY);
    ctx.scale(txtScale, txtScale);
    ctx.font = `bold ${Math.round(24 * k)}px "Courier New", monospace`;
    drawText(`x ${bananaCount}`, 0, 0, '#ffe070', '#3a2008');
    ctx.restore();

    // ROW 2 — SCORE (label + big value, primary)
    const row2Y = padY + rowH;
    ctx.font = `bold ${Math.round(11 * k)}px "Courier New", monospace`;
    drawText('PTS', padX, row2Y + 7 * k, '#a07050', '#000');
    ctx.font = `bold ${Math.round(22 * k)}px "Courier New", monospace`;
    drawText(`${score}`, padX + labelCol, row2Y, C.text, C.textShad);

    // ROW 3 — Distance (label + medium value)
    const row3Y = padY + rowH * 2;
    ctx.font = `bold ${Math.round(11 * k)}px "Courier New", monospace`;
    drawText('DIST', padX, row3Y + 5 * k, '#a07050', '#000');
    ctx.font = `bold ${Math.round(18 * k)}px "Courier New", monospace`;
    drawText(`${distance}m`, padX + labelCol, row3Y, '#d4a070', '#2a1408');

    ctx.textAlign = 'left';
}

// Floating "+N" text that pops up off collected bananas / milestones
function drawFloatTexts(){
    for (const f of floatTexts){
        const a = Math.max(0, 1 - (f.t / f.dur));
        const ease = 1 - Math.pow(1 - (f.t / f.dur), 2);
        const y = f.y + (f.vy || -60) * ease;
        const popScale = f.t < 0.10 ? 1 + (0.10 - f.t) * 4 : 1;  // brief pop
        ctx.save();
        ctx.globalAlpha = a;
        ctx.font = `bold ${Math.round((f.size || 18) * popScale)}px "Courier New", monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillText(f.text, f.x + 2, y + 2);
        ctx.fillStyle = f.color || '#ffe070';
        ctx.fillText(f.text, f.x, y);
        ctx.restore();
    }
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
}

// === COMBO VIGNETTE — golden edge glow that grows with combo ===
function drawComboVignette(){
    if (combo < 3 && comboBreakAnim <= 0) return;
    const intensity = Math.min(1, combo / 25);
    if (intensity > 0){
        const g = ctx.createRadialGradient(W/2, H/2, Math.min(W, H) * 0.35, W/2, H/2, Math.max(W, H) * 0.7);
        g.addColorStop(0, 'rgba(255, 200, 60, 0)');
        const edgeAlpha = 0.10 + intensity * 0.30;
        const col = combo >= 20 ? `rgba(255, 80, 40, ${edgeAlpha})`
                  : combo >= 10 ? `rgba(255, 140, 40, ${edgeAlpha})`
                                 : `rgba(255, 200, 60, ${edgeAlpha})`;
        g.addColorStop(1, col);
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
    }
    // Break flash — gray pulse
    if (comboBreakAnim > 0){
        ctx.fillStyle = `rgba(100, 100, 100, ${comboBreakAnim * 0.25})`;
        ctx.fillRect(0, 0, W, H);
    }
}

// === COMBO HUD — counter + radial timer ===
function drawCombo(){
    const k = HUD_SCALE;
    // Show "broken" anim falling/fading
    if (comboBreakAnim > 0 && lastBrokenCombo >= 2){
        const a = comboBreakAnim;
        const dropY = (1 - a) * 60;
        ctx.save();
        ctx.globalAlpha = a;
        ctx.font = `bold ${Math.round(48 * k)}px "Courier New", monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillText(`x${lastBrokenCombo}`, W/2 + 2, 70 * k + dropY + 2);
        ctx.fillStyle = '#888';
        ctx.fillText(`x${lastBrokenCombo}`, W/2, 70 * k + dropY);
        ctx.font = `bold ${Math.round(16 * k)}px "Courier New", monospace`;
        ctx.fillStyle = '#aaa';
        ctx.fillText('COMBO LOST', W/2, 110 * k + dropY);
        ctx.restore();
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
    }
    if (combo < 2) return;

    // Color escalation
    let col, glowCol;
    if      (combo >= 20){ col = '#ff5040'; glowCol = 'rgba(255, 80, 40, 0.6)'; }
    else if (combo >= 10){ col = '#ff9020'; glowCol = 'rgba(255, 140, 40, 0.5)'; }
    else if (combo >= 5){  col = '#ffd060'; glowCol = 'rgba(255, 200, 60, 0.45)'; }
    else                 { col = '#ffffff'; glowCol = 'rgba(255, 255, 255, 0.3)'; }

    // Pulse on each banana grab — comboTimer just refilled, pulse from full
    const fill = comboTimerMax > 0 ? Math.max(0, comboTimer / comboTimerMax) : 0;
    const pulse = 1 + (1 - fill) * 0.0;  // counter grows briefly on add
    const justGotIt = (comboTimerMax - comboTimer) < 0.10;
    const popScale = justGotIt ? 1.25 : 1.0;

    const cx = W / 2;
    const cy = (28 + 28) * k;   // top-center
    const radius = 30 * k;

    // Background ring
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.lineWidth = 5 * k;
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.stroke();

    // Timer ring — drains as combo timer counts down
    ctx.beginPath();
    ctx.arc(cx, cy, radius, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * fill);
    ctx.lineWidth = 5 * k;
    // Color of ring shifts to red as timer empties
    const timerCol = fill > 0.5 ? col
                   : fill > 0.25 ? '#ffa030'
                                  : '#ff4030';
    ctx.strokeStyle = timerCol;
    ctx.stroke();

    // Glow behind number
    ctx.fillStyle = glowCol;
    ctx.beginPath();
    ctx.arc(cx, cy, radius * 0.85 * popScale, 0, Math.PI * 2);
    ctx.fill();

    // Counter number
    const fontSize = Math.round((combo >= 100 ? 22 : 28) * k * popScale);
    ctx.font = `bold ${fontSize}px "Courier New", monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillText(`x${combo}`, cx + 1, cy + 2);
    ctx.fillStyle = col;
    ctx.fillText(`x${combo}`, cx, cy);

    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
}

function drawText(s, x, y, color, shadow){
    if (shadow){
        ctx.fillStyle = shadow;
        ctx.fillText(s, x + 2, y + 2);
    }
    ctx.fillStyle = color;
    ctx.fillText(s, x, y);
}

// ============================================================
// UI: BUTTONS / TEXT FITTING
// ============================================================
let activeButtons = [];   // re-populated each frame on menu / game-over

function fitTextSize(text, maxWidth, idealSize, weight = 'bold'){
    let size = idealSize;
    ctx.font = `${weight} ${size}px "Courier New", monospace`;
    const w = ctx.measureText(text).width;
    if (w > maxWidth) size = Math.floor(size * maxWidth / w);
    return size;
}

function roundedRect(x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
}

function drawButton(opts){
    const { x, y, w, h, label, primary = false, pulse = false, onTap } = opts;
    const t = pulse ? 0.5 + 0.5 * Math.sin(frame * 0.08) : 1;
    const lift = pulse ? Math.sin(frame * 0.06) * 1.5 : 0;
    const yy = y + lift;

    // Color bands — chunky pixel art, no smooth gradients
    let lightCol, midCol, darkCol, edgeCol, textCol, shadowCol;
    if (primary){
        lightCol = '#ffd870';
        midCol   = '#e08820';
        darkCol  = '#a04810';
        edgeCol  = '#3a1408';
        textCol  = '#ffffff';
        shadowCol = '#5a1808';
    } else {
        lightCol = '#6a4220';
        midCol   = '#3a2010';
        darkCol  = '#1a0c04';
        edgeCol  = '#000000';
        textCol  = '#f0c878';
        shadowCol = '#1a0c04';
    }

    // Hard rectangular drop shadow (offset 4px, no blur)
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(x + 4, yy + 5, w, h);

    // Three solid color bands stacked: top 35%, mid 35%, bottom 30%
    const band1 = Math.round(h * 0.35);
    const band2 = Math.round(h * 0.35);
    ctx.fillStyle = lightCol;
    ctx.fillRect(x, yy, w, band1);
    ctx.fillStyle = midCol;
    ctx.fillRect(x, yy + band1, w, band2);
    ctx.fillStyle = darkCol;
    ctx.fillRect(x, yy + band1 + band2, w, h - band1 - band2);

    // Hard-edge border (2px), with a 1px inner highlight on top-left
    ctx.fillStyle = edgeCol;
    ctx.fillRect(x, yy, w, 2);                  // top
    ctx.fillRect(x, yy + h - 2, w, 2);          // bottom
    ctx.fillRect(x, yy, 2, h);                  // left
    ctx.fillRect(x + w - 2, yy, 2, h);          // right
    // 1px inner highlight strips (top + left)
    ctx.fillStyle = primary ? 'rgba(255,255,255,0.5)' : 'rgba(255,220,150,0.25)';
    ctx.fillRect(x + 2, yy + 2, w - 4, 1);
    ctx.fillRect(x + 2, yy + 2, 1, h - 4);
    // 1px inner shadow (bottom + right)
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x + 2, yy + h - 3, w - 4, 1);
    ctx.fillRect(x + w - 3, yy + 2, 1, h - 4);

    // Pulsing pixel "corner brackets" instead of smooth glow
    if (pulse){
        const a = 0.35 + 0.45 * t;
        ctx.fillStyle = `rgba(255, 220, 80, ${a})`;
        const bs = 6, bw = 16;  // bracket size
        // Top-left
        ctx.fillRect(x - bs, yy - bs, bw, 2);
        ctx.fillRect(x - bs, yy - bs, 2, bw);
        // Top-right
        ctx.fillRect(x + w - bw + bs, yy - bs, bw, 2);
        ctx.fillRect(x + w + bs - 2, yy - bs, 2, bw);
        // Bottom-left
        ctx.fillRect(x - bs, yy + h + bs - 2, bw, 2);
        ctx.fillRect(x - bs, yy + h - bw + bs, 2, bw);
        // Bottom-right
        ctx.fillRect(x + w - bw + bs, yy + h + bs - 2, bw, 2);
        ctx.fillRect(x + w + bs - 2, yy + h - bw + bs, 2, bw);
    }

    // Label — pixel-style with hard offset shadow
    const labelSize = Math.round(h * 0.42);
    ctx.font = `bold ${labelSize}px "Courier New", monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = shadowCol;
    ctx.fillText(label, x + w/2 + 2, yy + h/2 + 2);
    ctx.fillStyle = textCol;
    ctx.fillText(label, x + w/2, yy + h/2);

    activeButtons.push({ x, y, w, h, onTap });

    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
}

// Pixel-style framed panel (hard edges, no rounded corners, double border)
function drawPixelPanel(x, y, w, h){
    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x + 4, y + 5, w, h);
    // Body
    ctx.fillStyle = '#2a1408';
    ctx.fillRect(x, y, w, h);
    // Outer border
    ctx.fillStyle = '#000';
    ctx.fillRect(x, y, w, 2);
    ctx.fillRect(x, y + h - 2, w, 2);
    ctx.fillRect(x, y, 2, h);
    ctx.fillRect(x + w - 2, y, 2, h);
    // Inner border (1px gold inset)
    ctx.fillStyle = '#5a3818';
    ctx.fillRect(x + 4, y + 4, w - 8, 1);
    ctx.fillRect(x + 4, y + h - 5, w - 8, 1);
    ctx.fillRect(x + 4, y + 4, 1, h - 8);
    ctx.fillRect(x + w - 5, y + 4, 1, h - 8);
}

// Convert a pointer event to canvas-internal coordinates.
function eventToCanvas(e){
    const rect = canvas.getBoundingClientRect();
    const t = e.touches && e.touches.length ? e.touches[0]
            : (e.changedTouches && e.changedTouches.length ? e.changedTouches[0] : e);
    const x = (t.clientX - rect.left) * W / rect.width;
    const y = (t.clientY - rect.top)  * H / rect.height;
    return { x, y };
}

function tryHitButton(cx, cy){
    for (let i = activeButtons.length - 1; i >= 0; i--){
        const b = activeButtons[i];
        if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h){
            b.onTap();
            return true;
        }
    }
    return false;
}

// --- VIGNETTE ---
function drawVignette(){
    const g = ctx.createRadialGradient(W/2, H/2, H*0.4, W/2, H/2, H*0.85);
    g.addColorStop(0, 'rgba(0,0,0,0)');
    g.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
}

// --- MENU ---
function drawMenu(){
    // Dim BG more aggressively so the gameplay world doesn't fight the UI
    ctx.fillStyle = 'rgba(8,4,20,0.78)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';

    const isLandscape = W > H;

    // === TITLE: use the pre-rendered logo sprite if loaded ===
    const titleSpr = SPRITES.title;
    const titleY = H * (isLandscape ? 0.08 : 0.07);
    let titleH;
    if (titleSpr){
        const maxW = W * 0.85;
        const maxH = H * (isLandscape ? 0.40 : 0.30);
        let drawW = maxW;
        let drawH = drawW * titleSpr.height / titleSpr.width;
        if (drawH > maxH){
            drawH = maxH;
            drawW = drawH * titleSpr.width / titleSpr.height;
        }
        ctx.drawImage(titleSpr, W/2 - drawW/2, titleY, drawW, drawH);
        titleH = drawH;
    } else {
        // Fallback: pixel-text title
        const lines = isLandscape ? ['MINE CART CARNAGE'] : ['MINE CART', 'CARNAGE'];
        const longest = lines.reduce((a, b) => a.length > b.length ? a : b);
        const cap = isLandscape ? Math.min(W * 0.07, H * 0.18, 72)
                                : Math.min(W * 0.15, H * 0.10, 84);
        const titleSize = fitTextSize(longest, W - 40, cap);
        ctx.font = `bold ${titleSize}px "Courier New", monospace`;
        const lineGap = titleSize * 1.05;
        ctx.lineWidth = Math.max(4, titleSize * 0.10);
        ctx.strokeStyle = '#1a0418';
        lines.forEach((l, i) => ctx.strokeText(l, W/2, titleY + i * lineGap));
        const tg = ctx.createLinearGradient(0, titleY, 0, titleY + lineGap * lines.length);
        tg.addColorStop(0, '#ffe080'); tg.addColorStop(0.55, '#d07820'); tg.addColorStop(1, '#7a3010');
        ctx.fillStyle = tg;
        lines.forEach((l, i) => ctx.fillText(l, W/2, titleY + i * lineGap));
        titleH = lineGap * lines.length;
    }

    // (subtitle removed — title speaks for itself)

    // === PLAY BUTTON ===
    const btnW = Math.min(W * (isLandscape ? 0.40 : 0.75), 360);
    const btnH = Math.min(H * (isLandscape ? 0.13 : 0.09), 78);
    const btnY = isLandscape ? H * 0.66 : H * 0.62;
    drawButton({
        x: W/2 - btnW/2, y: btnY, w: btnW, h: btnH,
        label: '▶  PLAY',
        primary: true, pulse: true,
        onTap: startGame,
    });

    // Hint text under button
    const hintSize = Math.max(11, Math.round(btnH * 0.22));
    ctx.font = `${hintSize}px "Courier New", monospace`;
    drawText('Tap the screen to jump', W/2, btnY + btnH + 12, '#a07050', '#000');

    // === BEST SCORE PANEL (16-bit framed) ===
    if (bestScore > 0 || bestDist > 0){
        const recSize = Math.max(14, Math.round(btnH * 0.28));
        const lineH = recSize * 1.15;
        const padY = recSize * 0.55;
        const badgeH = padY * 2 + lineH * 2;
        const badgeW = Math.min(W * 0.85, 380);
        const badgeY = H - badgeH - H * 0.06;
        const badgeX = W/2 - badgeW/2;
        drawPixelPanel(badgeX, badgeY, badgeW, badgeH);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.font = `bold ${recSize}px "Courier New", monospace`;
        drawText('★ HIGH SCORE ★', W/2, badgeY + padY, '#ffd070', '#3a1808');
        ctx.font = `${Math.round(recSize * 0.88)}px "Courier New", monospace`;
        drawText(`${bestScore} pts  ·  ${bestDist}m`,
                 W/2, badgeY + padY + lineH, '#f0c878', '#3a1808');
    }

    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
}

// --- GAME OVER ---
function drawGameOver(){
    ctx.fillStyle = `rgba(10,4,24,${Math.min(0.78, player.deadFrame * 0.95)})`;
    ctx.fillRect(0, 0, W, H);

    if (player.deadFrame < 0.3) return;

    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';

    const isPortrait = H > W;

    // === CRASH! title (top) ===
    const crashSize = fitTextSize('CRASH!', W - 60, Math.min(W * 0.18, 90));
    ctx.font = `bold ${crashSize}px "Courier New", monospace`;
    ctx.lineWidth = Math.max(4, crashSize * 0.10);
    ctx.strokeStyle = '#1a0204';
    const crashY = H * (isPortrait ? 0.07 : 0.14);
    ctx.strokeText('CRASH!', W/2, crashY);
    const tg = ctx.createLinearGradient(0, crashY, 0, crashY + crashSize);
    tg.addColorStop(0, '#ff9050');
    tg.addColorStop(1, '#9a1010');
    ctx.fillStyle = tg;
    ctx.fillText('CRASH!', W/2, crashY);

    // === SCORE PANEL — sized so values fit comfortably ===
    const panelW = Math.min(W * 0.85, 380);
    const panelH = Math.min(H * (isPortrait ? 0.13 : 0.22), 140);
    const panelX = W/2 - panelW/2;
    const panelY = crashY + crashSize * 1.20;
    drawPixelPanel(panelX, panelY, panelW, panelH);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';

    // SCORE big in middle, secondary stats on sides
    const labelSize = Math.max(13, Math.round(panelH * 0.16));
    const bigSize = Math.max(28, Math.round(panelH * 0.45));
    const sideSize = Math.max(16, Math.round(panelH * 0.24));
    // Center: SCORE
    ctx.font = `${labelSize}px "Courier New", monospace`;
    drawText('SCORE', W/2, panelY + panelH * 0.10, '#a07050', '#000');
    ctx.font = `bold ${bigSize}px "Courier New", monospace`;
    drawText(`${score}`, W/2, panelY + panelH * 0.32, '#ffe070', '#3a2008');
    // Sides: distance + bananas
    ctx.font = `${labelSize * 0.85}px "Courier New", monospace`;
    drawText('DISTANCE', panelX + panelW * 0.20, panelY + panelH * 0.72, '#a07050', '#000');
    drawText('BANANAS',   panelX + panelW * 0.80, panelY + panelH * 0.72, '#a07050', '#000');
    ctx.font = `bold ${sideSize}px "Courier New", monospace`;
    drawText(`${distance}m`,    panelX + panelW * 0.20, panelY + panelH * 0.86, C.text, C.textShad);
    drawText(`${bananaCount}`,  panelX + panelW * 0.80, panelY + panelH * 0.86, C.text, C.textShad);

    // === Best / New Record (OUTSIDE panel, with margin) ===
    const recSize = Math.max(15, Math.min(W * 0.045, 24));
    const recY = panelY + panelH + recSize * 0.7;
    const isNewBestScore = score > 0 && score > bestScore;
    const isNewBestDist  = distance > 0 && distance > bestDist;
    const isNewRec = isNewBestScore || isNewBestDist;
    if (isNewRec && player.deadFrame > 0.7){
        const flash = 0.65 + 0.35 * Math.sin(frame * 0.25);
        ctx.font = `bold ${recSize}px "Courier New", monospace`;
        ctx.globalAlpha = flash;
        drawText('★ NEW HIGH SCORE ★', W/2, recY, '#ffd070', '#7a3010');
        ctx.globalAlpha = 1;
    } else {
        ctx.font = `${recSize}px "Courier New", monospace`;
        drawText(`Best: ${bestScore} pts · ${bestDist}m`,
                 W/2, recY, '#a07050', '#000');
    }

    // === BUTTONS — anchored to the BOTTOM of the screen ===
    if (player.deadFrame > 0.5){
        const btnW = Math.min(W * 0.78, 360);
        const btnH = Math.min(H * (isPortrait ? 0.08 : 0.13), 72);
        const btnH2 = btnH * 0.7;
        const gap = btnH * 0.22;
        const btn2Y = H - btnH2 - H * 0.06;
        const btn1Y = btn2Y - gap - btnH;
        drawButton({
            x: W/2 - btnW/2, y: btn1Y, w: btnW, h: btnH,
            label: '↻  PLAY AGAIN',
            primary: true, pulse: true,
            onTap: startGame,
        });
        drawButton({
            x: W/2 - btnW/2, y: btn2Y, w: btnW, h: btnH2,
            label: 'MENU',
            primary: false,
            onTap: () => { state = STATE.MENU; initMenuWorld(); },
        });
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
    }

    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
}

// ============================================================
// MAIN LOOP
// ============================================================
let lastT = 0;
function loop(t){
    if (!lastT) lastT = t;
    let dt = (t - lastT) / 1000;
    lastT = t;
    if (dt > 0.1) dt = 0.1;
    update(dt);
    render();
    requestAnimationFrame(loop);
}
// Start the loop after sprites finish loading (or fail — fallbacks kick in).
loadSprites(() => {
    console.log('Sprites loaded:', Object.keys(SPRITES).join(', '));
    requestAnimationFrame(loop);
});

// Pre-spawn for menu visuals — re-callable on orientation change
function initMenuWorld(){
    segments.length = 0;
    bananas.length = 0;
    obstacles.length = 0;
    worldX = 0;
    segments.push({ x: -200, w: 9000, type:'TRACK', y: TIER_DEFAULT });
    nextSpawnX = 8800;
    for (let i = 0; i < 100; i++){
        bananas.push({
            x: 200 + i * 80,
            y: TIER_DEFAULT - 60 - Math.sin(i * 0.4) * 25,
            taken: false, anim: i * 0.3,
        });
    }
}
initMenuWorld();
// Slow scroll on menu
setInterval(() => {
    if (state === STATE.MENU){
        worldX += 0.6;
    }
}, 16);

</script>
